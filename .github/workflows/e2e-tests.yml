name: E2E Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install ${{ matrix.browser }}

      - name: Build applications
        run: pnpm build
        continue-on-error: true

      - name: Start development server
        run: |
          pnpm dev > /tmp/dev-server.log 2>&1 &
          # Wait for server to start
          sleep 15
          # Check if server is running
          if ! curl -f http://localhost:3000 > /dev/null 2>&1; then
            echo "Development server failed to start"
            cat /tmp/dev-server.log
            exit 1
          fi

      - name: Run E2E tests (${{ matrix.browser }})
        run: pnpm test:e2e -- --project=${{ matrix.browser }}
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        continue-on-error: true
        with:
          files: test-results/results.xml
          check_name: E2E Test Results (${{ matrix.browser }})

  test-summary:
    name: Test Summary
    needs: e2e-tests
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Check test results
        run: |
          echo "## E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "e2e-test-results-chromium" ]; then
            echo "✅ Chromium tests completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Chromium tests failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -d "e2e-test-results-firefox" ]; then
            echo "✅ Firefox tests completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Firefox tests failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -d "e2e-test-results-webkit" ]; then
            echo "✅ WebKit tests completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ WebKit tests failed" >> $GITHUB_STEP_SUMMARY
          fi
