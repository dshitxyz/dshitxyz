name: E2E Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  e2e-tests-info:
    name: E2E Tests Status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Report E2E test status
        run: |
          echo "## E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏭️ **Skipped in CI** - E2E tests require full system setup:" >> $GITHUB_STEP_SUMMARY
          echo "- API server on http://localhost:3001" >> $GITHUB_STEP_SUMMARY
          echo "- Database with test data" >> $GITHUB_STEP_SUMMARY
          echo "- Wallet functionality (MetaMask, RainbowKit)" >> $GITHUB_STEP_SUMMARY
          echo "- Web app on http://localhost:3000" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Run E2E tests locally:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Start all services" >> $GITHUB_STEP_SUMMARY
          echo "pnpm dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# In another terminal, run tests" >> $GITHUB_STEP_SUMMARY
          echo "pnpm test:e2e" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
