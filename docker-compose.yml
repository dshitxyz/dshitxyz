version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dshit-postgres
    environment:
      POSTGRES_USER: dshit_user
      POSTGRES_PASSWORD: dshit_password
      POSTGRES_DB: dshit
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dshit_user -d dshit']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
