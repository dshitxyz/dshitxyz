version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dshit-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dshit
      POSTGRES_PASSWORD: dshit_dev_password
      POSTGRES_DB: dshit_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dshit"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
